<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Recorder</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0d1117; color: #e6edf3; overflow: hidden; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%            { opacity: 1;   transform: scale(1); }
  }
  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.4); }
    50%       { box-shadow: 0 0 0 5px rgba(248, 81, 73, 0); }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-in {
    from { opacity: 0; } to { opacity: 1; }
  }

  textarea::placeholder { color: #484f58; }
  select option { background: #1c2128; }

  .record-btn:hover  { border-color: #f85149 !important; color: #f85149 !important; }
  .ghost-btn:hover   { border-color: #8b949e !important; color: #e6edf3 !important; }
  .send-btn:hover:not(:disabled) { filter: brightness(1.12); }
  .upload-zone:hover { border-color: #8b949e !important; background: rgba(255,255,255,0.03) !important; }
  .chat-entry { animation: slide-in 0.2s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ── Design Tokens ─────────────────────────────────── */
const T = {
  bg:       '#0d1117',
  surface:  '#161b22',
  surface2: '#1c2128',
  surface3: '#21262d',
  border:   '#30363d',
  text:     '#e6edf3',
  muted:    '#8b949e',
  dim:      '#484f58',
  accent:   '#f85149',
  green:    '#3fb950',
  blue:     '#79c0ff',
  yellow:   '#e3b341',
  orange:   '#ffa657',
  purple:   '#d2a8ff',
  mono:     '"JetBrains Mono", "Fira Code", monospace',
  sans:     '"Inter", system-ui, sans-serif',
};

/* ── Markdown Syntax Highlighter ───────────────────── */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function inlineHL(s) {
  // `s` is already HTML-escaped. Keep every marker character (rendered dim) so
  // the overlay text stays character-identical to the textarea — stripping them
  // would make the two wrap at different points and the caret drift off the text.
  // No padding/border here either: it must not change any glyph's advance width.
  const dim = t => `<span style="color:${T.dim}">${t}</span>`;
  return s.replace(
    /(\*\*\*)([^*]+?)(\*\*\*)|(\*\*)([^*]+?)(\*\*)|(\*)([^*\n]+?)(\*)|(\`)([^\`\n]+?)(\`)/g,
    (m, b3o,b3i,b3c, b2o,b2i,b2c, i1o,i1i,i1c, cdo,cdi,cdc) => {
      if (b3o) return dim(b3o) + `<b><em style="color:#fff">${b3i}</em></b>` + dim(b3c);
      if (b2o) return dim(b2o) + `<strong style="color:#fff;font-weight:600">${b2i}</strong>` + dim(b2c);
      if (i1o) return dim(i1o) + `<em style="color:#cdd9e5">${i1i}</em>` + dim(i1c);
      return dim(cdo) + `<span style="background:#1c2128;color:${T.green};border-radius:3px">${cdi}</span>` + dim(cdc);
    }
  );
}
function highlightMd(text) {
  return text.split('\n').map(raw => {
    const line = esc(raw);
    const hm = raw.match(/^(#{1,6}) (.*)$/);
    if (hm) {
      const lvl = hm[1].length;
      const cols = [T.blue,'#a5d6ff','#cae8ff',T.muted,T.muted,T.muted];
      return `<span style="color:${T.dim}">${esc(hm[1])} </span><span style="color:${cols[lvl-1]};font-weight:600">${inlineHL(esc(hm[2]))}</span>`;
    }
    if (/^---+$/.test(raw.trim()))
      return `<span style="color:${T.dim}">${line}</span>`;
    if (raw.startsWith('> '))
      return `<span style="color:${T.dim}">&gt; </span><span style="color:${T.muted}">${inlineHL(esc(raw.slice(2)))}</span>`;
    const lm = raw.match(/^(\s*)([-*+]|\d+\.) (.*)$/);
    if (lm)
      return `${esc(lm[1])}<span style="color:${T.dim}">${esc(lm[2])} </span><span style="color:${T.text}">${inlineHL(esc(lm[3]))}</span>`;
    if (raw.startsWith('```'))
      return `<span style="color:${T.dim}">${line}</span>`;
    if (!raw.trim()) return '';
    return `<span style="color:${T.text}">${inlineHL(line)}</span>`;
  }).join('\n');
}

/* ── Icons ─────────────────────────────────────────── */
const MicIcon = ({size=14,color='currentColor'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
  </svg>
);
const UploadIcon = ({size=14}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </svg>
);
const SendIcon = ({size=12}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor" stroke="none"/>
  </svg>
);
const StopIcon = ({size=10}) => (
  <svg width={size} height={size} viewBox="0 0 10 10"><rect width="10" height="10" rx="2" fill="currentColor"/></svg>
);

/* ── Waveform ───────────────────────────────────────── */
function Waveform() {
  const [h, setH] = React.useState([4,9,6,13,8,11,5,9,7,12,5]);
  React.useEffect(() => {
    const id = setInterval(() => setH(prev => prev.map(() => 3 + Math.random() * 12)), 100);
    return () => clearInterval(id);
  }, []);
  return (
    <div style={{display:'flex',gap:2,alignItems:'center',height:16}}>
      {h.map((v,i) => (
        <div key={i} style={{width:2,height:v,background:T.accent,borderRadius:1,transition:'height 0.09s ease'}}/>
      ))}
    </div>
  );
}

/* ── Section Label ──────────────────────────────────── */
const SectionLabel = ({children}) => (
  <div style={{fontSize:9,fontFamily:T.sans,fontWeight:600,color:T.dim,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:7}}>
    {children}
  </div>
);

/* ── Status Row ────────────────────────────────────── */
const StatusRow = ({label, ok}) => (
  <div style={{display:'flex',alignItems:'center',gap:6}}>
    <div style={{width:6,height:6,borderRadius:'50%',background:ok ? T.green : T.accent,flexShrink:0}}/>
    <span style={{fontFamily:T.mono,fontSize:10,color:T.muted}}>{label}</span>
    <span style={{fontFamily:T.mono,fontSize:9,color:ok ? T.green : T.accent,marginLeft:'auto'}}>{ok ? 'ok' : 'err'}</span>
  </div>
);

/* ── Left Panel ─────────────────────────────────────── */
function LeftPanel({ recording, onToggleRecord, recordTime, dragging, onDragOver, onDragLeave, onDrop, micDevices, selectedMic, onSelectMic, sttOk, openrouterOk, uploadFile, onOpenSettings, byokActive }) {
  const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

  return (
    <div style={{width:158,display:'flex',flexDirection:'column',borderRight:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>

      {/* ── Record ── */}
      <div style={{padding:'11px 10px 10px',borderBottom:`1px solid ${T.border}`}}>
        <SectionLabel>Record</SectionLabel>
        <button
          className="record-btn"
          onClick={onToggleRecord}
          style={{
            width:'100%',height:34,borderRadius:17,
            border:`1.5px solid ${recording ? T.accent : T.border}`,
            background: recording ? `rgba(248,81,73,0.1)` : T.surface2,
            color: recording ? T.accent : T.muted,
            fontFamily:T.mono,fontSize:11,fontWeight:500,
            display:'flex',alignItems:'center',justifyContent:'center',gap:7,
            cursor:'pointer',transition:'border-color 0.15s, color 0.15s, background 0.15s',outline:'none',
            animation: recording ? 'pulse-border 2s infinite' : 'none',
          }}>
          {recording
            ? <><StopIcon size={9}/><span>{fmt(recordTime)}</span><Waveform/></>
            : <><MicIcon size={13}/><span>Record</span></>}
        </button>

        <div style={{marginTop:8}}>
          <select
            value={selectedMic} onChange={e => onSelectMic(e.target.value)}
            style={{width:'100%',background:T.surface2,border:`1px solid ${T.border}`,color:T.muted,fontFamily:T.mono,fontSize:10,padding:'4px 6px',borderRadius:4,outline:'none',cursor:'pointer'}}>
            {micDevices.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
          </select>
        </div>
      </div>

      {/* ── Upload ── */}
      <div style={{padding:'11px 10px',borderBottom:`1px solid ${T.border}`,flex:1,display:'flex',flexDirection:'column'}}>
        <SectionLabel>Upload Audio</SectionLabel>
        <div
          className="upload-zone"
          onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
          onClick={() => document.getElementById('pr-file-input').click()}
          style={{
            flex:1,minHeight:90,
            border:`1.5px dashed ${dragging ? T.accent : T.border}`,
            borderRadius:6,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            gap:6,cursor:'pointer',
            background: dragging ? `rgba(248,81,73,0.06)` : 'transparent',
            transition:'border-color 0.15s, background 0.15s',
          }}>
          <UploadIcon size={18}/>
          <div style={{fontFamily:T.mono,fontSize:10,color:T.muted,textAlign:'center',lineHeight:1.6}}>
            drag & drop<br/>or click
          </div>
          <div style={{fontFamily:T.mono,fontSize:9,color:T.dim}}>mp3 · wav · m4a · ogg</div>
        </div>
        <input id="pr-file-input" type="file" accept="audio/*" style={{display:'none'}}
          onChange={e => { if(e.target.files[0]) onDrop({preventDefault:()=>{},dataTransfer:{files:e.target.files}}); e.target.value=''; }}/>

        {uploadFile && (
          <div style={{marginTop:8,padding:'6px 8px',background:T.surface2,borderRadius:4,border:`1px solid ${T.border}`,animation:'fade-in 0.2s'}}>
            <div style={{fontFamily:T.mono,fontSize:10,color:T.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{uploadFile.name}</div>
            <div style={{display:'flex',alignItems:'center',gap:5,marginTop:4}}>
              {uploadFile.error
                ? <><div style={{width:5,height:5,borderRadius:'50%',background:T.accent}}/><span style={{fontFamily:T.mono,fontSize:9,color:T.accent}}>{uploadFile.error}</span></>
                : uploadFile.done
                  ? <><div style={{width:5,height:5,borderRadius:'50%',background:T.green}}/><span style={{fontFamily:T.mono,fontSize:9,color:T.green}}>transcribed</span></>
                  : <><div style={{width:5,height:5,borderRadius:'50%',background:T.yellow,animation:'blink 1s infinite'}}/><span style={{fontFamily:T.mono,fontSize:9,color:T.yellow}}>{uploadFile.progress?.total ? `transcribing ${uploadFile.progress.done}/${uploadFile.progress.total} segments…` : 'processing…'}</span></>}
            </div>
          </div>
        )}
      </div>

      {/* ── API Key ── */}
      <div style={{padding:'10px',borderBottom:`1px solid ${T.border}`}}>
        <SectionLabel>API Key</SectionLabel>
        <button className="ghost-btn" onClick={onOpenSettings}
          style={{width:'100%',fontFamily:T.mono,fontSize:10,color:T.muted,background:T.surface2,border:`1px solid ${T.border}`,borderRadius:4,padding:'5px 8px',cursor:'pointer',transition:'border-color 0.12s, color 0.12s'}}>
          BYOK Settings
        </button>
        <div style={{fontFamily:T.mono,fontSize:9,color:byokActive ? T.green : T.dim,marginTop:6,lineHeight:1.4}}>
          {byokActive ? 'local key active' : 'server key / none'}
        </div>
      </div>

      {/* ── Status ── */}
      <div style={{padding:'10px'}}>
        <SectionLabel>Status</SectionLabel>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          <StatusRow label="OpenRouter STT" ok={sttOk}/>
          <StatusRow label="OpenRouter"  ok={openrouterOk}/>
        </div>
      </div>
    </div>
  );
}

/* ── Workspace ──────────────────────────────────────── */
function Workspace({ content, onChange, saving }) {
  const taRef  = React.useRef();
  const preRef = React.useRef();

  const highlighted = React.useMemo(() => highlightMd(content), [content]);

  const sharedStyle = {
    position:'absolute', inset:0,
    padding:'16px 22px',
    font:`13.5px/1.85 ${T.mono}`,
    whiteSpace:'pre-wrap',
    wordBreak:'break-word',
    overflowY:'auto',
    overflowX:'hidden',
    tabSize:2,
  };

  const syncScroll = () => {
    if (preRef.current && taRef.current)
      preRef.current.scrollTop = taRef.current.scrollTop;
  };

  const exportMd = () => {
    const blob = new Blob([content], {type:'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'workspace.md';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Auto-scroll to bottom when content is appended externally
  React.useEffect(() => {
    if (taRef.current) {
      taRef.current.scrollTop = taRef.current.scrollHeight;
      if (preRef.current) preRef.current.scrollTop = taRef.current.scrollHeight;
    }
  }, [content]);

  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
      <div style={{height:36,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',padding:'0 14px',gap:10,background:T.surface,flexShrink:0}}>
        <span style={{fontFamily:T.sans,fontSize:12,fontWeight:600,color:T.text,flex:1}}>Workspace</span>
        <span style={{fontFamily:T.mono,fontSize:10,color:T.dim}}>
          {saving === 'saving' ? <span style={{color:T.yellow}}>saving…</span>
           : saving === 'error' ? <span style={{color:T.accent}}>save failed</span>
           : <span style={{color:T.dim}}>auto-save ✓</span>}
        </span>
        <div style={{width:1,height:14,background:T.border}}/>
        <button className="ghost-btn" onClick={exportMd}
          style={{fontFamily:T.mono,fontSize:10,color:T.muted,background:'none',border:`1px solid ${T.border}`,borderRadius:4,padding:'2px 9px',cursor:'pointer',transition:'border-color 0.12s, color 0.12s'}}>
          Export .md
        </button>
      </div>

      <div style={{flex:1,position:'relative',background:T.bg,overflow:'hidden'}}>
        <pre ref={preRef}
          aria-hidden="true"
          dangerouslySetInnerHTML={{__html: highlighted + '\n'}}
          style={{...sharedStyle, color:T.text, background:T.bg, margin:0, pointerEvents:'none', overflow:'hidden'}}
        />
        <textarea ref={taRef}
          value={content}
          onChange={e => onChange(e.target.value)}
          onScroll={syncScroll}
          spellCheck={false}
          autoCorrect="off"
          style={{...sharedStyle, color:'transparent', caretColor:T.text, background:'transparent',
            border:'none', outline:'none', resize:'none', position:'absolute', zIndex:1,
            width:'100%', height:'100%'}}
        />
      </div>
    </div>
  );
}

/* ── Chat Panel ─────────────────────────────────────── */
function ChatPanel({ history, onSend, isProcessing, model }) {
  const [input, setInput] = React.useState('');
  const listRef = React.useRef();

  React.useEffect(() => {
    if (listRef.current)
      listRef.current.scrollTop = listRef.current.scrollHeight;
  }, [history, isProcessing]);

  const send = () => {
    const t = input.trim();
    if (!t || isProcessing) return;
    onSend(t);
    setInput('');
  };

  return (
    <div style={{width:256,display:'flex',flexDirection:'column',borderLeft:`1px solid ${T.border}`,background:T.surface,flexShrink:0}}>
      <div style={{height:36,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',padding:'0 10px',gap:8}}>
        <span style={{fontFamily:T.sans,fontSize:12,fontWeight:600,color:T.text,flex:1}}>LLM</span>
        <span title={model ? `${model} — change in Settings` : 'Set a model in Settings'}
          style={{fontFamily:T.mono,fontSize:10,color:T.muted,maxWidth:160,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
          {model || 'no model set'}
        </span>
      </div>

      <div ref={listRef} style={{flex:1,overflowY:'auto',padding:'12px 10px',display:'flex',flexDirection:'column',gap:0}}>
        {history.length === 0 && (
          <div style={{fontFamily:T.mono,fontSize:11,color:T.dim,lineHeight:1.7,fontStyle:'italic',padding:'4px 0'}}>
            Ask the LLM to process the workspace. Output is appended below a{' '}
            <span style={{color:T.muted}}>---</span> divider with a generated heading.
          </div>
        )}
        {history.map((msg, i) => (
          <div key={i} className="chat-entry" style={{paddingBottom:12,marginBottom:12,borderBottom: i < history.length-1 ? `1px solid ${T.border}` : 'none'}}>
            <div style={{fontFamily:T.mono,fontSize:9,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:5,
              color: msg.role==='user' ? T.blue : msg.role==='error' ? T.accent : T.green}}>
              {msg.role === 'user' ? '→ you' : msg.role === 'error' ? '✕ error' : '← llm'}
            </div>
            <div style={{fontFamily:T.mono,fontSize:12,color: msg.role === 'error' ? T.accent : T.text,lineHeight:1.65,whiteSpace:'pre-wrap'}}>
              {msg.content}
            </div>
          </div>
        ))}
        {isProcessing && (
          <div className="chat-entry" style={{paddingBottom:12}}>
            <div style={{fontFamily:T.mono,fontSize:9,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8,color:T.green}}>← llm</div>
            <div style={{display:'flex',gap:4,alignItems:'center'}}>
              {[0,1,2].map(i => (
                <div key={i} style={{width:5,height:5,borderRadius:'50%',background:T.muted,
                  animation:`blink 1.2s ${i*0.22}s infinite`}}/>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={{padding:'8px',borderTop:`1px solid ${T.border}`,display:'flex',flexDirection:'column',gap:6}}>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Ask the LLM…"
          rows={3}
          style={{
            background:T.surface2,border:`1px solid ${T.border}`,borderRadius:4,
            color:T.text,fontFamily:T.mono,fontSize:12,padding:'7px 9px',
            resize:'none',outline:'none',lineHeight:1.6,width:'100%',
            transition:'border-color 0.12s',
          }}
          onFocus={e => e.target.style.borderColor = T.dim}
          onBlur={e  => e.target.style.borderColor = T.border}
        />
        <button className="send-btn" onClick={send}
          disabled={isProcessing || !input.trim()}
          style={{
            height:30,borderRadius:4,border:'none',
            background: (isProcessing || !input.trim()) ? T.surface3 : T.accent,
            color: (isProcessing || !input.trim()) ? T.dim : '#fff',
            fontFamily:T.sans,fontSize:12,fontWeight:600,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6,
            cursor:(isProcessing || !input.trim()) ? 'not-allowed' : 'pointer',
            transition:'background 0.15s, color 0.15s',
          }}>
          <SendIcon size={11}/>
          Send
        </button>
        <div style={{fontFamily:T.mono,fontSize:9,color:T.dim,textAlign:'center'}}>
          shift+enter for newline · LLM reads full workspace
        </div>
      </div>
    </div>
  );
}

/* ── Titlebar ───────────────────────────────────────── */
function Titlebar({ onOpenSettings, byokActive }) {
  return (
    <div style={{height:36,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',padding:'0 14px',background:T.surface,flexShrink:0,gap:10}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7.5" stroke={T.accent} strokeWidth="1.5"/>
          <rect x="6" y="4" width="4" height="6" rx="2" fill={T.accent}/>
          <path d="M4 8a4 4 0 008 0M8 12v1.5M6 13.5h4" stroke={T.accent} strokeWidth="1.2" strokeLinecap="round"/>
        </svg>
        <span style={{fontFamily:T.sans,fontSize:13,fontWeight:600,color:T.text}}>Project Recorder</span>
      </div>
      <div style={{width:1,height:14,background:T.border}}/>
      <span style={{fontFamily:T.mono,fontSize:10,color:T.dim,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',minWidth:0}}>speech-to-text workspace</span>
      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
        {byokActive && (
          <span style={{fontFamily:T.mono,fontSize:9,color:T.green,letterSpacing:'0.06em',textTransform:'uppercase'}}>BYOK active</span>
        )}
        <button className="ghost-btn" onClick={onOpenSettings}
          style={{fontFamily:T.mono,fontSize:10,color:T.muted,background:'none',border:`1px solid ${T.border}`,borderRadius:4,padding:'2px 9px',cursor:'pointer',transition:'border-color 0.12s, color 0.12s'}}>
          Settings

/* ── Audio Utilities ────────────────────────────────── */
// Long audio is split into fixed-length segments and transcribed in parallel,
// so each request is a small, separate Pages Function invocation.
const STT_TARGET_RATE         = 16000;          // downsample each segment to 16 kHz mono
const DEFAULT_SEGMENT_MINUTES = 15;             // default segment length (user-configurable)
const MIN_SEGMENT_MINUTES     = 1;
const MAX_SEGMENT_MINUTES     = 30;
const MAX_AUDIO_SECONDS       = 3 * 3600 + 600; // ~3h10m hard cap (browser-memory guard)
const STT_CONCURRENCY     = 3;              // parallel transcription requests (keep load low)
const STT_SEGMENT_RETRIES = 4;              // retries (transient 5xx) before a segment is marked failed

const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

function arrayBufferToBase64(buffer) {
  const bytes = new Uint8Array(buffer);
  const chunkSize = 0x8000;
  let binary = '';
  for (let i = 0; i < bytes.length; i += chunkSize) {
    binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
  }
  return btoa(binary);
}

// Encode mono Float32 samples as a 16-bit PCM WAV, returned as base64.
function encodeWavBase64(samples, sampleRate) {
  const numSamples = samples.length;
  const wavBuf = new ArrayBuffer(44 + numSamples * 2);
  const view = new DataView(wavBuf);
  const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, 36 + numSamples * 2, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);           // chunk size
  view.setUint16(20, 1, true);            // PCM
  view.setUint16(22, 1, true);            // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true); // byte rate
  view.setUint16(32, 2, true);            // block align
  view.setUint16(34, 16, true);           // bits per sample
  writeStr(36, 'data');
  view.setUint32(40, numSamples * 2, true);
  for (let i = 0; i < numSamples; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return arrayBufferToBase64(wavBuf);
}

// Convert any browser-recorded audio blob to WAV (PCM) via AudioContext (mic short path).
async function blobToWavBase64(blob) {
  const arrayBuf = await blob.arrayBuffer();
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const decoded = await audioCtx.decodeAudioData(arrayBuf);
  const base64 = encodeWavBase64(decoded.getChannelData(0), decoded.sampleRate);
  audioCtx.close();
  return base64;
}

// Decode a file/blob to one mono Float32 channel at STT_TARGET_RATE. Decoding
// inside a 16 kHz context avoids materializing a native-rate PCM buffer for
// multi-hour audio; we defensively resample if the browser ignores the rate.
async function decodeTo16kMono(fileOrBlob) {
  const arrayBuf = await fileOrBlob.arrayBuffer();
  const Ctor = window.AudioContext || window.webkitAudioContext;
  let ctx;
  try { ctx = new Ctor({ sampleRate: STT_TARGET_RATE }); }
  catch { ctx = new Ctor(); }

  let decoded;
  try { decoded = await ctx.decodeAudioData(arrayBuf); }
  finally { ctx.close(); }

  if (decoded.sampleRate === STT_TARGET_RATE) return decoded.getChannelData(0);

  // Browser ignored the requested rate — resample to 16 kHz mono offline.
  const frames = Math.ceil(decoded.duration * STT_TARGET_RATE);
  const offline = new OfflineAudioContext(1, frames, STT_TARGET_RATE);
  const src = offline.createBufferSource();
  src.buffer = decoded;
  src.connect(offline.destination);
  src.start();
  const rendered = await offline.startRendering();
  return rendered.getChannelData(0);
}

// Read an audio file's duration (seconds) from metadata without decoding it.
function probeDurationSeconds(fileOrBlob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(fileOrBlob);
    const el = document.createElement('audio');
    el.preload = 'metadata';
    const finish = (value) => { URL.revokeObjectURL(url); resolve(value); };
    el.onloadedmetadata = () => finish(Number.isFinite(el.duration) ? el.duration : 0);
    el.onerror = () => finish(0);
    el.src = url;
  });
}

// Split a sample count into ordered fixed-length segment ranges.
function sliceSegments(totalSamples, rate, segmentSeconds) {
  const per = segmentSeconds * rate;
  const segs = [];
  for (let start = 0, index = 0; start < totalSamples; start += per, index++) {
    const end = Math.min(start + per, totalSamples);
    segs.push({ index, sampleStart: start, sampleEnd: end, startSec: start / rate, endSec: end / rate });
  }
  return segs;
}

function fmtTimecode(seconds) {
  const t = Math.max(0, Math.round(seconds));
  const pad = (n) => String(n).padStart(2, '0');
  return `${pad(Math.floor(t / 3600))}:${pad(Math.floor((t % 3600) / 60))}:${pad(t % 60)}`;
}

// Run `worker` over items with a fixed concurrency cap; results stay in item order.
async function runPool(items, worker, concurrency) {
  const results = new Array(items.length);
  let next = 0;
  async function lane() {
    while (next < items.length) {
      const i = next++;
      results[i] = await worker(items[i], i);
    }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, lane));
  return results;
}

// Decode long audio, transcribe each segment in parallel, and reassemble the
// transcript with timecode subheadings. Returns the combined Markdown body.
async function transcribeLongAudio(fileOrBlob, { sttModel, apiHeaders, onProgress, segmentSeconds }) {
  const samples = await decodeTo16kMono(fileOrBlob);
  const segments = sliceSegments(samples.length, STT_TARGET_RATE, segmentSeconds);
  let done = 0;
  if (onProgress) onProgress(0, segments.length);

  const parts = await runPool(segments, async (seg) => {
    const range = `${fmtTimecode(seg.startSec)}–${fmtTimecode(seg.endSec)}`;
    let part;
    let lastErr = '';
    for (let attempt = 0; attempt <= STT_SEGMENT_RETRIES && part === undefined; attempt++) {
      try {
        const audio = encodeWavBase64(samples.subarray(seg.sampleStart, seg.sampleEnd), STT_TARGET_RATE);
        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: apiHeaders({
            'Content-Type': 'application/json',
            ...(sttModel ? { 'X-STT-Model': sttModel } : {}),
          }),
          body: JSON.stringify({ audio, format: 'wav', filename: `segment-${seg.index + 1}.wav` }),
        });
        const data = await readJson(res);
        if (!res.ok) {
          const e = new Error(data.error || `HTTP ${res.status}`);
          e.status = res.status;
          throw e;
        }
        part = `## ${range}\n\n${(data.text || '').trim()}\n`;
      } catch (err) {
        lastErr = err.message;
        // Retry only transient failures (gateway/overload/rate-limit/network);
        // fail fast on 4xx (bad request, auth, missing route).
        const status = err.status || 0;
        const transient = status === 0 || status === 429 || status >= 500;
        if (!transient || attempt === STT_SEGMENT_RETRIES) break;
        await sleep(Math.min(8000, 600 * 2 ** attempt) + Math.floor(Math.random() * 400));
      }
    }
    if (part === undefined) {
      part = `## ${range}\n\n> ⚠️ Transcription failed for this segment (${range}): ${lastErr}.\n`;
    }
    done += 1;
    if (onProgress) onProgress(done, segments.length);
    return part;
  }, STT_CONCURRENCY);

  return parts.join('\n');
}

/* ── App ────────────────────────────────────────────── */
const DEFAULT_CONTENT = '# Workspace\n\nStart **recording** or upload an audio file to begin transcription.\n\nYour transcribed text will appear here in real-time.\n';
const BYOK_STORAGE_KEY = 'project-recorder.openrouter-api-key';
const STT_MODEL_STORAGE_KEY = 'project-recorder.stt-model';
const LLM_MODEL_STORAGE_KEY = 'project-recorder.llm-model';
const SEGMENT_MINUTES_STORAGE_KEY = 'project-recorder.segment-minutes';

function readStored(key) {
  try {
    return localStorage.getItem(key) || '';
  } catch {
    return '';
  }
}

function writeStored(key, value) {
  try {
    if (value) localStorage.setItem(key, value);
    else localStorage.removeItem(key);
  } catch {}
}

const readStoredByokKey = () => readStored(BYOK_STORAGE_KEY);
const writeStoredByokKey = (value) => writeStored(BYOK_STORAGE_KEY, value);

// Parse a response as JSON, but fail with a legible message when the body is
// HTML/empty (e.g. an /api route that didn't reach a Pages Function and fell
// through to a 404 / error / SPA page).
async function readJson(res) {
  const body = await res.text();
  try {
    return body ? JSON.parse(body) : {};
  } catch {
    const looksHtml = /^\s*</.test(body);
    const detail = looksHtml
      ? 'the endpoint returned HTML, not JSON — the /api Pages Function may not be deployed or active for this route'
      : 'the endpoint returned a non-JSON response';
    const e = new Error(`Server error (HTTP ${res.status}): ${detail}.`);
    e.status = res.status;
    throw e;
  }
}

function App() {
  const [content, setContent]          = React.useState(DEFAULT_CONTENT);
  const [recording, setRecording]      = React.useState(false);
  const [recordTime, setRecordTime]    = React.useState(0);
  const [dragging, setDragging]        = React.useState(false);
  const [saving, setSaving]            = React.useState('saved');
  const [chatHistory, setChatHistory]  = React.useState([]);
  const [isProcessing, setIsProcessing]= React.useState(false);
  const [models, setModels]            = React.useState([]);
  const [serverSttModel, setServerSttModel] = React.useState('');
  const [model, setModel]              = React.useState(() => readStored(LLM_MODEL_STORAGE_KEY));
  const [sttModel, setSttModel]        = React.useState(() => readStored(STT_MODEL_STORAGE_KEY));
  const [segmentMinutes, setSegmentMinutes] = React.useState(() => {
    const n = parseInt(readStored(SEGMENT_MINUTES_STORAGE_KEY), 10);
    return n >= MIN_SEGMENT_MINUTES && n <= MAX_SEGMENT_MINUTES ? n : DEFAULT_SEGMENT_MINUTES;
  });
  const [uploadFile, setUploadFile]    = React.useState(null);
  const [selectedMic, setSelectedMic]  = React.useState('default');
  const [micDevices, setMicDevices]    = React.useState([{id:'default', label:'Default Input'}]);
  const [openrouterOk, setOpenrouterOk]= React.useState(false);
  const [sttOk, setSttOk]              = React.useState(false);
  const [settingsOpen, setSettingsOpen]= React.useState(false);
  const [byokKey, setByokKey]          = React.useState(readStoredByokKey);
  const [byokDraft, setByokDraft]      = React.useState(byokKey);
  const [sttDraft, setSttDraft]        = React.useState(sttModel);
  const [llmDraft, setLlmDraft]        = React.useState(model);
  const [segmentDraft, setSegmentDraft]= React.useState(String(segmentMinutes));
  const segmentSeconds = segmentMinutes * 60;

  const timerRef       = React.useRef();
  const saveTimer      = React.useRef();
  const contentRef     = React.useRef(content);
  const mediaRecRef    = React.useRef(null);
  const recordCountRef = React.useRef(0);

  contentRef.current = content;

  const apiHeaders = React.useCallback((headers = {}) => {
    const next = {...headers};
    const key = byokKey.trim();
    if (key) next['X-OpenRouter-Api-Key'] = key;
    return next;
  }, [byokKey]);

  const updateModel = React.useCallback((id) => {
    setModel(id);
    writeStored(LLM_MODEL_STORAGE_KEY, id);
  }, []);

  // --- Load config, workspace on mount ---
  React.useEffect(() => {
    fetch('/api/config').then(r => r.json()).then(data => {
      setModels(data.models || []);
      setServerSttModel(data.sttModel || '');
      setModel(m => m || data.models?.[0]?.id || '');
    }).catch(() => {});

    fetch('/api/workspace').then(r => r.text()).then(text => {
      if (text) setContent(text);
    }).catch(() => {});

    // Enumerate mic devices
    navigator.mediaDevices?.enumerateDevices().then(devices => {
      const mics = devices.filter(d => d.kind === 'audioinput');
      if (mics.length) {
        setMicDevices(mics.map(d => ({
          id: d.deviceId || 'default',
          label: d.label || `Mic ${d.deviceId?.slice(0,8)}`,
        })));
        setSelectedMic(mics[0].deviceId || 'default');
      }
    }).catch(() => {});
  }, []);

  // --- Validate the server key or the locally saved BYOK key ---
  React.useEffect(() => {
    fetch('/api/health', { headers: apiHeaders() }).then(r => r.json()).then(data => {
      setOpenrouterOk(!!data.openrouter);
      setSttOk(data.stt == null ? !!data.openrouter : !!data.stt);
    }).catch(() => {
      setOpenrouterOk(false);
      setSttOk(false);
    });
  }, [apiHeaders]);

  React.useEffect(() => {
    if (settingsOpen) {
      setByokDraft(byokKey);
      setSttDraft(sttModel);
      setLlmDraft(model || '');
      setSegmentDraft(String(segmentMinutes));
    }
  }, [settingsOpen, byokKey, sttModel, model, segmentMinutes]);

  const saveSettings = React.useCallback(() => {
    const key = byokDraft.trim();
    writeStoredByokKey(key);
    setByokKey(key);

    const stt = sttDraft.trim();
    writeStored(STT_MODEL_STORAGE_KEY, stt);
    setSttModel(stt);

    const llm = llmDraft.trim() || models[0]?.id || '';
    updateModel(llm);

    const mins = Math.min(MAX_SEGMENT_MINUTES, Math.max(MIN_SEGMENT_MINUTES, parseInt(segmentDraft, 10) || DEFAULT_SEGMENT_MINUTES));
    writeStored(SEGMENT_MINUTES_STORAGE_KEY, String(mins));
    setSegmentMinutes(mins);

    setSettingsOpen(false);
  }, [byokDraft, sttDraft, llmDraft, models, updateModel, segmentDraft]);

  const clearByokSettings = React.useCallback(() => {
    writeStoredByokKey('');
    setByokKey('');
    setByokDraft('');
  }, []);

  // --- Auto-save to backend ---
  const handleContentChange = React.useCallback((val) => {
    setContent(val);
    contentRef.current = val;
    setSaving('saving');
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fetch('/api/workspace', {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: val,
      }).then(r => {
        if (!r.ok) throw new Error('Save failed');
        setSaving('saved');
      }).catch(() => setSaving('error'));
    }, 700);
  }, []);

  // --- File upload: send as base64 to backend ---
  const handleDrop = React.useCallback(async (e) => {
    e.preventDefault();
    setDragging(false);
    const file = e.dataTransfer?.files?.[0] || e.target?.files?.[0];
    if (!file) return;

    setUploadFile({name: file.name, done: false, error: null});

    try {
      const dur = await probeDurationSeconds(file);
      if (dur > MAX_AUDIO_SECONDS) {
        throw new Error(`Audio too long to process in-browser (${fmtTimecode(dur)} > ${fmtTimecode(MAX_AUDIO_SECONDS)})`);
      }

      if (dur > segmentSeconds) {
        const body = await transcribeLongAudio(file, {
          sttModel,
          apiHeaders,
          segmentSeconds,
          onProgress: (done, total) => setUploadFile({ name: file.name, done: false, error: null, progress: { done, total } }),
        });
        handleContentChange(contentRef.current + `\n\n---\n\n# Transcription — ${file.name}\n\n${body}\n`);
      } else {
        const formData = new FormData();
        formData.append('audio', file);

        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: apiHeaders(sttModel ? { 'X-STT-Model': sttModel } : {}),
          body: formData,
        });
        const data = await readJson(res);
        if (!res.ok) throw new Error(data.error || `Transcription failed (HTTP ${res.status})`);

        if (data.text) {
          handleContentChange(contentRef.current + `\n\n---\n\n# Transcription — ${file.name}\n\n${data.text}\n`);
        }
      }
      setUploadFile({name: file.name, done: true, error: null});
    } catch (err) {
      setUploadFile({name: file.name, done: false, error: err.message});
    }
  }, [apiHeaders, handleContentChange, sttModel, segmentSeconds]);

  // --- Mic recording: capture with MediaRecorder, transcribe on stop ---
  const toggleRecord = React.useCallback(async () => {
    if (recording) {
      // Stop recording
      setRecording(false);
      clearInterval(timerRef.current);
      const rec = mediaRecRef.current;
      if (rec) {
        rec.recorder.stop(); // triggers onstop → transcription
      }
      return;
    }

    // Start recording
    try {
      const constraints = {
        audio: {
          deviceId: selectedMic !== 'default' ? { exact: selectedMic } : undefined,
          channelCount: 1,
        },
      };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : 'audio/webm';
      const recorder = new MediaRecorder(stream, { mimeType });
      const chunks = [];

      recorder.ondataavailable = (e) => {
        if (e.data.size > 0) chunks.push(e.data);
      };

      recordCountRef.current += 1;
      const count = recordCountRef.current;
      let startedAt = 0;

      recorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        mediaRecRef.current = null;

        if (!chunks.length) return;

        const label = `Recording ${count}`;
        setUploadFile({ name: label, done: false, error: null });

        try {
          const blob = new Blob(chunks, { type: mimeType });
          // MediaRecorder webm blobs often report Infinity duration, so use the
          // elapsed record time to decide whether to segment.
          const elapsedSec = (Date.now() - startedAt) / 1000;

          if (elapsedSec > segmentSeconds) {
            const body = await transcribeLongAudio(blob, {
              sttModel,
              apiHeaders,
              segmentSeconds,
              onProgress: (done, total) => setUploadFile({ name: label, done: false, error: null, progress: { done, total } }),
            });
            handleContentChange(contentRef.current + `\n\n---\n\n# Transcription — ${label}\n\n${body}\n`);
          } else {
            const base64 = await blobToWavBase64(blob);
            const res = await fetch('/api/transcribe', {
              method: 'POST',
              headers: apiHeaders({
                'Content-Type': 'application/json',
                ...(sttModel ? { 'X-STT-Model': sttModel } : {}),
              }),
              body: JSON.stringify({ audio: base64, format: 'wav', filename: label }),
            });
            const data = await readJson(res);
            if (!res.ok) throw new Error(data.error || `Transcription failed (HTTP ${res.status})`);

            if (data.text) {
              handleContentChange(contentRef.current + `\n\n---\n\n# Transcription — ${label}\n\n${data.text}\n`);
            }
          }
          setUploadFile({ name: label, done: true, error: null });
        } catch (err) {
          setUploadFile({ name: label, done: false, error: err.message });
        }
      };

      startedAt = Date.now();
      recorder.start(1000); // collect in 1s chunks
      setRecording(true);
      setRecordTime(0);
      timerRef.current = setInterval(() => setRecordTime(t => t + 1), 1000);
      mediaRecRef.current = { recorder, stream, count };
    } catch (err) {
      console.error('Mic access failed:', err);
    }
  }, [recording, selectedMic, apiHeaders, handleContentChange, sttModel, segmentSeconds]);

  React.useEffect(() => () => clearInterval(timerRef.current), []);

  // --- LLM Chat ---
  const handleSend = React.useCallback(async (text) => {
    setChatHistory(h => [...h, { role: 'user', content: text }]);
    setIsProcessing(true);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: apiHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({
          message: text,
          workspace: contentRef.current,
          model,
        }),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullResponse = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('data: ')) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              if (parsed.error) throw new Error(parsed.error);
              const delta = parsed.choices?.[0]?.delta?.content;
              if (delta) {
                fullResponse += delta;
                setChatHistory(h => {
                  const updated = [...h];
                  const lastIdx = updated.length - 1;
                  if (lastIdx >= 0 && updated[lastIdx].role === 'assistant' && updated[lastIdx]._streaming) {
                    updated[lastIdx] = { ...updated[lastIdx], content: fullResponse };
                  } else {
                    updated.push({ role: 'assistant', content: fullResponse, _streaming: true });
                  }
                  return updated;
                });
              }
            } catch (e) {
              if (e.message && !e.message.includes('JSON')) throw e;
            }
          }
        }
      }

      if (fullResponse) {
        const heading = text.charAt(0).toUpperCase() + text.slice(1).replace(/[?.!]+$/, '');
        const appended = `\n\n---\n\n# ${heading}\n\n${fullResponse}\n`;
        handleContentChange(contentRef.current + appended);

        setChatHistory(h => {
          const updated = [...h];
          const lastIdx = updated.length - 1;
          if (lastIdx >= 0 && updated[lastIdx]._streaming) {
            updated[lastIdx] = { role: 'assistant', content: `Done. Output appended under "# ${heading}".` };
          }
          return updated;
        });
      } else {
        setChatHistory(h => [...h, { role: 'assistant', content: 'No response from LLM.' }]);
      }
    } catch (err) {
      setChatHistory(h => [...h, { role: 'error', content: err.message }]);
    } finally {
      setIsProcessing(false);
    }
  }, [model, apiHeaders, handleContentChange]);

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:T.bg,color:T.text}}>
      <Titlebar onOpenSettings={() => setSettingsOpen(true)} byokActive={!!byokKey}/>
      {settingsOpen && (
        <SettingsModal
          byokDraft={byokDraft}
          byokActive={!!byokKey}
          onByokChange={setByokDraft}
          sttDraft={sttDraft}
          onSttChange={setSttDraft}
          serverSttModel={serverSttModel}
          llmDraft={llmDraft}
          onLlmChange={setLlmDraft}
          models={models}
          segmentDraft={segmentDraft}
          onSegmentChange={setSegmentDraft}
          onSave={saveSettings}
          onClear={clearByokSettings}
          onClose={() => setSettingsOpen(false)}
        />
      )}
      <div style={{flex:1,display:'flex',minHeight:0}}>
        <LeftPanel
          recording={recording}     onToggleRecord={toggleRecord}
          recordTime={recordTime}
          dragging={dragging}
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={handleDrop}
          micDevices={micDevices}   selectedMic={selectedMic}   onSelectMic={setSelectedMic}
          sttOk={sttOk}  openrouterOk={openrouterOk}
          uploadFile={uploadFile}
          onOpenSettings={() => setSettingsOpen(true)}
          byokActive={!!byokKey}
        />
        <Workspace content={content} onChange={handleContentChange} saving={saving}/>
        <ChatPanel
          history={chatHistory}    onSend={handleSend}
          isProcessing={isProcessing}
          model={model}
        />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
